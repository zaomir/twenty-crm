# ============================================
# NGINX Configuration для Twenty CRM
# File: twenty-crm.conf
# Location: /etc/nginx/sites-available/twenty-crm
# 
# Setup:
# sudo cp twenty-crm.conf /etc/nginx/sites-available/
# sudo ln -s /etc/nginx/sites-available/twenty-crm /etc/nginx/sites-enabled/
# sudo nginx -t  # Check syntax
# sudo systemctl reload nginx
# ============================================

# HTTP -> HTTPS редирект
server {
    listen 80;
    listen [::]:80;
    server_name crm.grainee.com;
    
    location / {
        return 301 https://$server_name$request_uri;
    }
    
    # Для Let's Encrypt renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name crm.grainee.com;
    
    # ========== SSL CERTIFICATES ==========
    # Let's Encrypt (убедитесь что сертификат получен)
    # sudo certbot certonly --nginx -d crm.grainee.com
    ssl_certificate /etc/letsencrypt/live/crm.grainee.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.grainee.com/privkey.pem;
    
    # SSL Best Practices
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # ========== SECURITY HEADERS ==========
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # ========== LOGGING ==========
    access_log /var/log/nginx/twenty-crm-access.log combined;
    error_log /var/log/nginx/twenty-crm-error.log warn;
    
    # ========== GZIP COMPRESSION ==========
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/rss+xml;
    
    # ========== UPSTREAM DEFINITIONS ==========
    # Twenty API (Node.js на :3001)
    upstream twenty_api {
        server localhost:3001;
        keepalive 32;
    }
    
    # Twenty Web Frontend (React на :3002)
    upstream twenty_web {
        server localhost:3002;
        keepalive 32;
    }
    
    # ========== RATE LIMITING ==========
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=web_limit:10m rate=30r/s;
    
    # ========== API ROUTES (/api/*) ==========
    location /api/ {
        # Rate limiting
        limit_req zone=api_limit burst=20 nodelay;
        
        # Proxy settings
        proxy_pass http://twenty_api;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        
        # WebSocket support (для real-time updates)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # CORS headers (API может overwrite эти)
        add_header 'Access-Control-Allow-Origin' '$scheme://$host' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        add_header 'Access-Control-Max-Age' '3600' always;
        
        # Опции запросы
        if ($request_method = 'OPTIONS') {
            return 200;
        }
    }
    
    # ========== HEALTH CHECK ==========
    location /health {
        access_log off;
        proxy_pass http://twenty_api;
        proxy_http_version 1.1;
    }
    
    # ========== WEBHOOKS (из внешних сервисов) ==========
    location /webhooks/ {
        # Не ограничиваем скорость для webhooks
        proxy_pass http://twenty_api;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Webhook может быть медленным
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
    
    # ========== WEB FRONTEND (React) ==========
    location / {
        # Rate limiting
        limit_req zone=web_limit burst=50 nodelay;
        
        # Proxy settings
        proxy_pass http://twenty_web;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # React SPA: кешируем статические ассеты, индекс не кешируем
        if ($request_uri ~* \.(?:jpg|jpeg|gif|png|ico|css|js|woff|woff2|ttf|eot|svg)$) {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
        
        # index.html всегда свежий (для SPA routing)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            proxy_pass http://twenty_web;
        }
    }
    
    # ========== STATIC FILES ==========
    location ~* ^/uploads/ {
        alias /docker/twenty-data/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }
    
    # ========== DENY ACCESS ==========
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ========== NOTES ==========
# 1. Убедитесь что GRAINEE (port 3000) не конфликтует:
#    - GRAINEE on localhost:3000 (прямой порт, не через nginx для внутреннего использования)
#    - Twenty Web on localhost:3002 (proxied через этот конфиг)
#
# 2. Для renewal сертификата:
#    sudo certbot renew --quiet
#
# 3. Для дебага:
#    sudo tail -f /var/log/nginx/twenty-crm-access.log
#    sudo tail -f /var/log/nginx/twenty-crm-error.log
#
# 4. Проверка здоровья:
#    curl https://crm.grainee.com/health
#    curl https://crm.grainee.com/api/health
