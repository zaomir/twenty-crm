# Twenty CRM — controlcenter.me (twentycrm/twenty single image)
# Copy .env.controlcenter.example → .env and set secrets before deploy.
# PG_DATABASE_URL must NOT use ?schema=public — psql in entrypoint rejects it.

services:
  twenty:
    image: twentycrm/twenty:latest
    container_name: controlcenter-crm
    ports:
      - "3030:3000"
      - "3040:3001"
    environment:
      - NODE_ENV=production
      - SERVER_URL=${SERVER_URL:-https://controlcenter.me}
      - PORT=3000
      - PG_DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - APP_SECRET=${APP_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - controlcenter-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  postgres:
    image: postgres:16
    container_name: controlcenter-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - controlcenter-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7
    container_name: controlcenter-redis
    ports:
      - "${REDIS_HOST_PORT:-6381}:6379"
    volumes:
      - redis_data:/data
    networks:
      - controlcenter-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  controlcenter-network:
    driver: bridge
