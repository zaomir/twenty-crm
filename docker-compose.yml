version: '3.8'
services:
  twenty:
    image: twentycrm/twenty:latest
    container_name: controlcenter-crm
    ports:
      - "3030:3000"
      - "3040:3001"
    environment:
      - NODE_ENV=production
      - SERVER_URL=https://controlcenter.me
      - PORT=3000
      - PG_DATABASE_URL=postgresql://controlcenter_user:tK7mP9nQ2rL4wX8sF1dJ5hB3cV6xY0zA@postgres:5432/controlcenter_prod
      - REDIS_URL=redis://redis:6379
      - APP_SECRET=7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a
    depends_on:
      - postgres
      - redis
    networks:
      - controlcenter-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:16
    container_name: controlcenter-postgres
    environment:
      - POSTGRES_DB=controlcenter_prod
      - POSTGRES_USER=controlcenter_user
      - POSTGRES_PASSWORD=tK7mP9nQ2rL4wX8sF1dJ5hB3cV6xY0zA
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - controlcenter-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U controlcenter_user"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7
    container_name: controlcenter-redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    networks:
      - controlcenter-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  controlcenter-network:
    driver: bridge
